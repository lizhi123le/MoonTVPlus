services:
  - type: web
    name: moontvplus
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    startCommand: node start.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOSTNAME
        value: 0.0.0.0
      - key: PORT
        value: 10000
